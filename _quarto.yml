project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - plm/*.ipynb
    - gnn/*.ipynb
    - ig/*.ipynb
    - capstones/*.ipynb

# Render the notebooks exactly as committed - never re-execute. The cells
# need a GPU + ESM-2 models, so execution stays local (via the papermill
# runner); the site just publishes the saved outputs.
execute:
  enabled: false
  freeze: true

website:
  title: "Protein LMs + GNNs Lesson Suite"
  description: "Hands-on teaching suite: protein language models, graph neural networks, and explainability."
  reader-mode: true
  page-navigation: true
  search: true
  repo-url: https://github.com/LampOfSocrates/xai-starter
  navbar:
    left:
      - text: "Home"
        href: index.qmd
  sidebar:
    style: docked
    search: true
    collapse-level: 1
    contents:
      - section: "Protein Language Models (pLM)"
        contents:
          - plm/plm_tutorial.ipynb
          - plm/plm_demo.ipynb
          - plm/plm_l1_embeddings_probe.ipynb
          - plm/plm_l2_zero_shot_variants.ipynb
          - plm/plm_l3_finetune_classification.ipynb
          - plm/plm_l4_token_classification.ipynb
          - plm/plm_l5_model_comparison.ipynb
          - plm/plm_l6_attention_contacts.ipynb
          - plm/plm_l7_lora_peft.ipynb
          - plm/plm_l8_structure_aware.ipynb
          - plm/plm_l9_embedding_retrieval.ipynb
          - plm/plm_l10_inverse_folding.ipynb
          - plm/plm_l11_calibration.ipynb
      - section: "Graph Neural Networks (GNN)"
        contents:
          - gnn/gnn_tutorial.ipynb
          - gnn/gnn_l1_graphs_from_proteins.ipynb
          - gnn/gnn_l2_node_classification.ipynb
          - gnn/gnn_l3_graph_classification.ipynb
          - gnn/gnn_l4_plm_plus_gnn.ipynb
          - gnn/gnn_l5_equivariant_gnn.ipynb
          - gnn/gnn_l6_real_structures.ipynb
          - gnn/gnn_l7_edge_features.ipynb
          - gnn/gnn_l8_contact_prediction.ipynb
          - gnn/gnn_l9_knn_graphs.ipynb
          - gnn/gnn_l10_oversmoothing.ipynb
          - gnn/gnn_l11_interaction_graphs.ipynb
      - section: "Explainability - Idea-4 (PINDER/SKEMPI)"
        contents:
          - ig/ig_l1_simple.ipynb
          - ig/ig_l2_tiny_network.ipynb
          - ig/ig_l3_pinder_graphs.ipynb
          - ig/ig_l4_struct2graph_train.ipynb
          - ig/ig_l5_ig_node_embeddings.ipynb
          - ig/ig_l6_attention_gnnexplainer.ipynb
          - ig/ig_l7_skempi_consensus_benchmark.ipynb
      - section: "Capstones"
        contents:
          - capstones/capstone_l1_end_to_end_plm_gnn.ipynb
          - capstones/capstone_l2_benchmark_suite.ipynb

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 2
    code-copy: true
    code-tools: true
    code-overflow: wrap
    fig-responsive: true
